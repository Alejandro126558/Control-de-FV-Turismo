<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1e293b"/>
    
    <g fill="#0f172a" opacity="0.4" stroke="#334155" stroke-width="1">
        <rect x="50" y="40" width="120" height="100" rx="8"/>
        <rect x="200" y="40" width="180" height="100" rx="8"/>
        <rect x="410" y="40" width="140" height="220" rx="8"/>
        <rect x="580" y="40" width="170" height="120" rx="8"/>
        
        <rect x="50" y="170" width="150" height="150" rx="8"/>
        <rect x="230" y="170" width="150" height="110" rx="8"/>
        
        <rect x="580" y="190" width="170" height="180" rx="8"/>
        <rect x="50" y="350" width="330" height="110" rx="8"/>
        <rect x="410" y="290" width="140" height="170" rx="8"/>
    </g>

    <g fill="none" stroke="#475569" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
        <path d="M 0,150 L 390,150 L 390,270 L 800,270" />
        <path d="M 180,0 L 180,500" />
        <path d="M 390,150 L 560,0" stroke-width="8"/>
        <path d="M 560,270 L 560,500" />
    </g>

    <path d="M 180,450 L 180,150 L 390,150 L 390,270 L 700,270" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 4"/>

    <circle cx="390" cy="150" r="45" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="350" y="95" fill="#10b981" font-family="monospace" font-size="11" fw="bold">GEOCERCA OK</text>

    <g transform="translate(390, 190)">
        <circle cx="0" cy="0" r="18" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.7">
            <animate attributeName="r" values="10;25;10" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <path d="M 0,0 C -10,-10 -15,-25 0,-35 C 15,-25 10,-10 0,0 Z" fill="#ef4444" />
        <circle cx="0" cy="-24" r="5" fill="#ffffff" />
    </g>

    <rect x="20" y="20" width="180" height="55" rx="6" fill="#0f172a" fill-opacity="0.9" stroke="#334155" stroke-width="1"/>
    <text x="35" y="42" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">DISPOSITIVO: GPS-V4</text>
    <text x="35" y="60" fill="#10b981" font-family="monospace" font-size="11">LAT: 4.4389° N</text>
</svg>
